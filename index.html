<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a0533" />
    <meta name="description" content="A special birthday surprise, made with love." />

    <!-- Open Graph / Social sharing (intentionally vague for surprise) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Something Special For You 💜" />
    <meta property="og:description" content="Open this when you're ready for a surprise." />

    <!-- Prevent indexing — this is a private gift -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- Favicon: simple heart emoji as SVG -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>" />

    <!-- Preconnect for Google Fonts fallback (Dancing Script) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Font preloads for @fontsource/dancing-script.
      The actual @font-face declarations come from the npm package imported in main.jsx.
      These preload hints tell the browser to fetch the woff2 files early.
    -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/node_modules/@fontsource/dancing-script/files/dancing-script-latin-400-normal.woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/node_modules/@fontsource/dancing-script/files/dancing-script-latin-700-normal.woff2"
      crossorigin="anonymous"
    />

    <!-- Critical CSS: prevent flash of unstyled content on black background -->
    <style>
      /* Ensure the page starts black before React hydrates */
      html, body, #root {
        margin: 0;
        padding: 0;
        background-color: #000000;
        color: #f8f0ff;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Hide scrollbar during loading */
      body.loading {
        overflow: hidden;
      }

      /* Reduced motion: applied globally via JS, but also respect OS setting immediately */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>

    <title>Happy Birthday 💜</title>
  </head>
  <body class="loading">
    <div id="root"></div>

    <!-- Remove loading class once React mounts -->
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        // Will be removed by React app on mount
        // Kept here as a safety fallback
        setTimeout(function () {
          document.body.classList.remove('loading');
        }, 100);
      });
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
